<svg viewBox="0 0 920 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2E75B6" />
    </marker>
  </defs>
  <rect width="920" height="560" fill="#ffffff"/>

  <!-- Lifelines -->
  <!-- x positions: Dev=80, App=260, Prod=440, Proxy=620, Target=820 -->
  <g font-size="14" font-weight="bold" fill="#1F4E79">
    <rect x="30" y="20" width="100" height="36" rx="6" fill="#EAF3FB" stroke="#2E75B6"/>
    <text x="80" y="43" text-anchor="middle">Developer</text>

    <rect x="210" y="20" width="100" height="36" rx="6" fill="#EAF3FB" stroke="#2E75B6"/>
    <text x="260" y="43" text-anchor="middle">App</text>

    <rect x="390" y="20" width="100" height="36" rx="6" fill="#EAF3FB" stroke="#2E75B6"/>
    <text x="440" y="43" text-anchor="middle">Product</text>

    <rect x="570" y="20" width="100" height="36" rx="6" fill="#EAF3FB" stroke="#2E75B6"/>
    <text x="620" y="43" text-anchor="middle">API Proxy</text>

    <rect x="765" y="20" width="110" height="36" rx="6" fill="#EAF3FB" stroke="#2E75B6"/>
    <text x="820" y="43" text-anchor="middle">Backend</text>
  </g>

  <!-- Lifelines (dashed vertical) -->
  <line x1="80" y1="56" x2="80" y2="530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="260" y1="56" x2="260" y2="530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="440" y1="56" x2="440" y2="530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="620" y1="56" x2="620" y2="530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="820" y1="56" x2="820" y2="530" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Messages -->
  <g font-size="13" fill="#333">
    <line x1="80" y1="90" x2="260" y2="90" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="170" y="83" text-anchor="middle">Creates App</text>

    <line x1="260" y1="140" x2="440" y2="140" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="350" y="133" text-anchor="middle">Subscribes to Product</text>

    <line x1="440" y1="190" x2="260" y2="190" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="350" y="183" text-anchor="middle">Generates API Key</text>

    <line x1="260" y1="240" x2="620" y2="240" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="440" y="233" text-anchor="middle">Calls API with Key</text>

    <line x1="620" y1="290" x2="440" y2="290" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="530" y="283" text-anchor="middle">Validates Key &amp; Product</text>

    <line x1="620" y1="340" x2="820" y2="340" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="720" y="333" text-anchor="middle">Forwards Request</text>

    <line x1="820" y1="390" x2="620" y2="390" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="720" y="383" text-anchor="middle">Returns Response</text>

    <line x1="620" y1="440" x2="260" y2="440" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow2)"/>
    <text x="440" y="433" text-anchor="middle">Returns Response</text>
  </g>
</svg>
