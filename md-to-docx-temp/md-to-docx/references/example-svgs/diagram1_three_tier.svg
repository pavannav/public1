<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2E75B6" />
    </marker>
  </defs>
  <rect width="760" height="420" fill="#ffffff"/>

  <!-- A: API Proxy -->
  <rect x="40" y="30" width="180" height="56" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="130" y="64" text-anchor="middle" font-size="16" fill="#1F4E79" font-weight="bold">API Proxy</text>

  <!-- B: API Product -->
  <rect x="40" y="160" width="180" height="56" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="130" y="194" text-anchor="middle" font-size="16" fill="#1F4E79" font-weight="bold">API Product</text>

  <!-- C: App -->
  <rect x="40" y="290" width="180" height="56" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="130" y="324" text-anchor="middle" font-size="16" fill="#1F4E79" font-weight="bold">App</text>

  <!-- D: Developer -->
  <rect x="430" y="290" width="200" height="56" rx="8" fill="#E9F7EC" stroke="#2E7D32" stroke-width="2"/>
  <text x="530" y="324" text-anchor="middle" font-size="16" fill="#1b5e20" font-weight="bold">Developer</text>

  <!-- E: API Key/Credentials -->
  <rect x="430" y="160" width="290" height="56" rx="8" fill="#FFF6E5" stroke="#B25E00" stroke-width="2"/>
  <text x="575" y="194" text-anchor="middle" font-size="16" fill="#7d4e00" font-weight="bold">API Key / Credentials</text>

  <!-- Arrows -->
  <line x1="130" y1="86" x2="130" y2="160" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="140" y="125" font-size="13" fill="#444">Bundled into</text>

  <line x1="130" y1="216" x2="130" y2="290" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="140" y="255" font-size="13" fill="#444">Subscribed by</text>

  <line x1="220" y1="318" x2="430" y2="318" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="270" y="310" font-size="13" fill="#444">Owned by</text>

  <line x1="220" y1="300" x2="430" y2="200" stroke="#B25E00" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="240" font-size="13" fill="#444">Generates</text>
</svg>
