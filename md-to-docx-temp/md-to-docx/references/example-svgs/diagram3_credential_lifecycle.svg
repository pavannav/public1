<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2E75B6" />
    </marker>
  </defs>
  <rect width="1000" height="360" fill="#ffffff"/>

  <!-- A Create App -->
  <rect x="20" y="140" width="140" height="50" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="90" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F4E79">Create App</text>

  <!-- B Generate Credentials -->
  <rect x="200" y="140" width="160" height="50" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="280" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79">Generate</text>
  <text x="280" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79">Credentials</text>

  <!-- C Approve Product -->
  <rect x="400" y="140" width="150" height="50" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="475" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79">Approve</text>
  <text x="475" y="180" text-anchor="middle" font-size="12" font-weight="bold" fill="#1F4E79">Product</text>

  <!-- D Active/In Use -->
  <rect x="590" y="140" width="140" height="50" rx="8" fill="#E9F7EC" stroke="#2E7D32" stroke-width="2"/>
  <text x="660" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Active / In Use</text>

  <!-- E Need Change? (diamond) -->
  <polygon points="850,165 920,120 990,165 920,210" fill="#FFF6E5" stroke="#B25E00" stroke-width="2"/>
  <text x="920" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">Need</text>
  <text x="920" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d4e00">Change?</text>

  <!-- F Add New Credential (top) -->
  <rect x="780" y="20" width="170" height="50" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="865" y="44" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">Add New</text>
  <text x="865" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">Credential</text>

  <!-- G Revoke Credential (bottom) -->
  <rect x="780" y="280" width="170" height="50" rx="8" fill="#FCEAEA" stroke="#B3261E" stroke-width="2"/>
  <text x="865" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b1c1c">Revoke</text>
  <text x="865" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b1c1c">Credential</text>

  <!-- H Modify Products (far right) -->
  <rect x="20" y="280" width="170" height="50" rx="8" fill="#EAF3FB" stroke="#2E75B6" stroke-width="2"/>
  <text x="105" y="304" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">Modify</text>
  <text x="105" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1F4E79">Products</text>

  <!-- I Inactive -->
  <rect x="980" y="280" width="0" height="0"/>
  <rect x="780" y="195" width="0" height="0"/>

  <!-- Arrows main chain -->
  <line x1="160" y1="165" x2="200" y2="165" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="360" y1="165" x2="400" y2="165" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="550" y1="165" x2="590" y2="165" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="730" y1="165" x2="850" y2="165" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- E -> F Rotate -->
  <path d="M 920,120 L 920,80 L 865,80 L 865,70" fill="none" stroke="#2E75B6" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="930" y="95" font-size="11" fill="#444">Rotate</text>

  <!-- E -> G Revoke -->
  <path d="M 920,210 L 920,250 L 865,250 L 865,280" fill="none" stroke="#B3261E" stroke-width="2" marker-end="url(#arrow3)"/>
  <text x="930" y="245" font-size="11" fill="#444">Revoke</text>

  <!-- E -> H Update -->
  <path d="M 850,180 C 600,260 300,260 195,280" fill="none" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow3)"/>
  <text x="500" y="270" font-size="11" fill="#444">Update</text>

  <!-- F -> D back -->
  <path d="M 780,45 L 660,45 L 660,140" fill="none" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- G -> Inactive label -->
  <text x="865" y="350" text-anchor="middle" font-size="11" fill="#8b1c1c" font-weight="bold">→ Inactive</text>

  <!-- H -> D back -->
  <path d="M 190,317 L 660,317 L 660,190" fill="none" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrow3)"/>
</svg>
